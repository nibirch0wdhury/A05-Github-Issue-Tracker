<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker | Login Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Geist', sans-serif; } </style>
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center px-4">

    <div class="w-full max-w-md bg-base-100 rounded-xl shadow-xl p-6 md:p-9 space-y-5">

        <div class="flex flex-col items-center gap-2 text-center">
            <img src="./assets/github-logo.png" alt="logo" class="mb-3 w-14">
            <h1 class="text-2xl font-semibold">GitHub Issues Tracker</h1>
            <p class="text-base-content/60">Sign in to manage your issues</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block font-semibold text-[#1F2937] mb-1">Username</label>
                <input id="txt-user" type="text" placeholder="Enter Username" class="input w-full" />
                <p class="text-[#4A00FF] text-sm mt-1">Default: admin</p>
            </div>
            <div>
                <label class="block font-semibold text-[#1F2937] mb-1">Password</label>
                <input id="txt-pass" type="password" placeholder="Enter Password" class="input w-full" />
                <p class="text-[#4A00FF] text-sm mt-1">Default: admin123</p>
            </div>
            <button id="sign-in-btn" class="btn btn-primary w-full mt-2">Sign In</button>
        </div>

        <div class="flex items-center gap-3">
            <div class="flex-1 h-px bg-gray-200"></div>
            <span class="text-sm text-base-content/50">Or</span>
            <div class="flex-1 h-px bg-gray-200"></div>
        </div>

        <div class="text-center space-y-2">
            <p class="text-[#64748B] text-sm">Demo Credentials:</p>
            <div class="bg-gray-100 rounded-lg py-5 space-y-1">
                <p><span class="font-semibold">Username:</span> admin</p>
                <p><span class="font-semibold">Password:</span> admin123</p>
            </div>
        </div>

    </div>
    <script src="./scripts/index.js"></script>
</body>
</html>
