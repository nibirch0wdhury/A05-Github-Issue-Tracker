<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker | Home Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Geist', sans-serif; } </style>
</head>
<body class="bg-base-200">

    <main class="container mx-auto px-5 md:px-7">

        <nav class="mb-10 p-4 bg-base-100 shadow rounded-md flex justify-center lg:justify-between items-center flex-wrap gap-5">
            <div class="flex items-center gap-2">
                <i class="fa-brands fa-github text-2xl"></i>
                <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
            </div>
            <div class="flex items-center gap-2">
                <label class="input">


                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="search-field" type="search" placeholder="Search issues..." />
                </label>
                <button id="search-btn" class="btn btn-primary text-base font-semibold"> + New Issues</button>
            </div>
        </nav>

        <section class="flex gap-3 p-4 rounded-md bg-base-100 shadow mb-4">
            <button data-tab="all" class="tab-btn btn btn-primary px-6">All</button>
            <button data-tab="open" class="tab-btn btn px-6">Open</button>
            <button data-tab="closed" class="tab-btn btn px-6">Closed</button>
        </section>

        <section class="p-4 rounded-md bg-base-100 shadow mb-4 flex flex-col sm:flex-row justify-between sm:items-center gap-4">
            <div class="flex gap-4 sm:gap-2 items-center">
                <img src="./assets/Aperture.png" alt="" class="bg-[#ECE4FF] p-2 rounded-full">
                <div>
                    <h2 id="issues-count" class="text-xl font-semibold"></h2>
                    <p class="text-[#64748B] text-base tracking-wider">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-6 sm:gap-3 mx-2">
                <div class="flex gap-2 items-center">


                    <div class="size-3 rounded-full bg-green-600"></div>
                    <h2 class="font-medium text-base">Open</h2>
                </div>
                <div class="flex gap-2 items-center">
                    <div class="size-3 rounded-full bg-purple-600 mr-2"></div>
                    <h2 class="font-medium text-base">Closed</h2>
                </div>
            </div>
        </section>

        <section id="spinner-section">

            <div class="flex justify-center items-center py-10">
                <span class="loading loading-bars loading-xl"></span>
            </div>
        </section>

        <section id="cards-section" class="p-4 rounded-md shadow mb-4 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3"></section>

        <dialog id="issue-modal" class="modal modal-bottom sm:modal-middle">
            <div id="modal-spinner-wrap" class="flex justify-center items-center py-10">
                <span class="loading loading-bars loading-xl"></span>
            </div>
            <div class="modal-box">

                <div id="modal-content"></div>
                <div class="modal-action">
                    <form method="dialog">
                        <button class="btn btn-primary">Close</button>
                    </form>
                </div>
            </div>
        </dialog>

    </main>
    <script src="./scripts/homePage.js"></script>
</body>
</html>
